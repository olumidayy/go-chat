name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'jumble' }}
  APP_NAME: ${{ vars.APP_NAME || 'jumble' }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'jumble' }}

jobs:
  deploy:
    name: Build and Deploy to EKS
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required configuration
        run: |
          missing=0
          if [ -z "$EKS_CLUSTER_NAME" ]; then
            echo "::error::Repository variable EKS_CLUSTER_NAME is required."
            missing=1
          fi
          if [ -z "$AWS_REGION" ]; then
            echo "::error::Repository variable AWS_REGION is required."
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Validate AWS authentication configuration
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$AWS_ROLE_TO_ASSUME" ] && { [ -z "$AWS_ACCESS_KEY_ID" ] || [ -z "$AWS_SECRET_ACCESS_KEY" ]; }; then
            echo "::error::Set AWS_ROLE_TO_ASSUME (OIDC) or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC role)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Configure AWS credentials (access key fallback)
        if: ${{ secrets.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" --region "$AWS_REGION"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          image_tag="${GITHUB_SHA::12}"
          image_uri="$REGISTRY/$ECR_REPOSITORY:$image_tag"

          docker build -t "$image_uri" .
          docker push "$image_uri"

          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Apply deployment and service
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
        run: |
          kubectl get namespace "$K8S_NAMESPACE" >/dev/null 2>&1 || kubectl create namespace "$K8S_NAMESPACE"

          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${K8S_NAMESPACE}
            labels:
              app: ${APP_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
              spec:
                containers:
                  - name: ${APP_NAME}
                    image: ${IMAGE_URI}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8080
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /
                        port: 8080
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${K8S_NAMESPACE}
          spec:
            type: ClusterIP
            selector:
              app: ${APP_NAME}
            ports:
              - protocol: TCP
                port: 80
                targetPort: 8080
          EOF

          kubectl rollout status deployment/"$APP_NAME" -n "$K8S_NAMESPACE" --timeout=180s

      - name: Apply ALB ingress (optional)
        if: ${{ vars.DOMAIN_NAME != '' && vars.ACM_CERT_ARN != '' }}
        env:
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          ACM_CERT_ARN: ${{ vars.ACM_CERT_ARN }}
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${APP_NAME}
            namespace: ${K8S_NAMESPACE}
            annotations:
              kubernetes.io/ingress.class: alb
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
              alb.ingress.kubernetes.io/certificate-arn: ${ACM_CERT_ARN}
              alb.ingress.kubernetes.io/ssl-redirect: '443'
              alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
          spec:
            rules:
              - host: ${DOMAIN_NAME}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${APP_NAME}
                          port:
                            number: 80
          EOF

      - name: Show deployment resources
        run: |
          kubectl get deploy,svc,ing -n "$K8S_NAMESPACE"
